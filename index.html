<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/dream_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@200;300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Alegreya+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>Dream by Stannum</title>
    <script>
      // Apply theme before React mounts to avoid a flash of the wrong theme.
      // Mirrors the logic in ThemeContext (read pref from localStorage, fall back to system).
      (function () {
        try {
          var pref = localStorage.getItem("app:theme-preference") || "light";
          var resolved = pref;
          if (pref === "system") {
            resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
